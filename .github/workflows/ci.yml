name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Bootstrap example configuration
        run: make bootstrap
      - name: Validate configuration
        run: make validate
      - name: Run tests
        run: make test
      - name: Syntax checks
        run: make syntax
      - name: Compose validation
        run: docker compose config -q
      - name: Docker image build
        run: docker compose build api bot

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check shell scripts
        run: shellcheck scripts/*.sh scripts/install-managed-host scripts/xui-safe-update scripts/xui-system-update
