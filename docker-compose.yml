services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-server-header
    restart: unless-stopped
    volumes:
      - ./config:/config:ro
      - ./data:/data
      - ./secrets:/run/secrets:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks: [web_net, control_net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    command: python -m app.bot
    restart: unless-stopped
    volumes:
      - ./config:/config:ro
      - ./data:/data
      - ./secrets:/run/secrets:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks: [control_net]
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    networks: [web_net]
    depends_on:
      api:
        condition: service_healthy

networks:
  web_net:
  control_net:

volumes:
  caddy_data:
  caddy_config:
